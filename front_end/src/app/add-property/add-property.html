<div class="add-property-container">
  <div class="form-card">
    <button class="back-btn" (click)="goBack()">← Back</button>
    
    <div class="form-header">
      <h1>Add New Property</h1>
      <p>List your property on Rentease</p>
    </div>

    <div *ngIf="success" class="success-message">
      <h3>✓ Property Added Successfully!</h3>
      <p>Redirecting to dashboard...</p>
    </div>

    <form *ngIf="!success" (ngSubmit)="onSubmit()" class="property-form">
      <div class="form-group">
        <label for="title">Property Title *</label>
        <input 
          type="text" 
          id="title" 
          [(ngModel)]="property.title" 
          name="title"
          placeholder="e.g., Spacious 3BHK Apartment"
          class="form-input"
          required
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="type">Property Type *</label>
          <select 
            id="type" 
            [(ngModel)]="property.type" 
            name="type"
            class="form-input"
          >
            <option *ngFor="let type of propertyTypes" [value]="type">{{type | titlecase}}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="location">Location *</label>
          <select 
            id="location" 
            [(ngModel)]="property.location" 
            name="location"
            class="form-input"
            required
          >
            <option value="">Select City</option>
            <option *ngFor="let city of cities" [value]="city">{{city}}</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="price">Monthly Rent (£) *</label>
        <input 
          type="number" 
          id="price" 
          [(ngModel)]="property.price" 
          name="price"
          placeholder="e.g., 1200"
          class="form-input"
          min="0"
          required
        />
      </div>

      <div class="form-group checkbox-group">
        <label>
          <input 
            type="checkbox" 
            [(ngModel)]="property.available" 
            name="available"
          />
          <span>Property is currently available</span>
        </label>
      </div>

      <div *ngIf="error" class="error-message">
        {{error}}
      </div>

      <button 
        type="submit" 
        class="submit-btn" 
        [disabled]="loading"
      >
        <span *ngIf="!loading">Add Property</span>
        <span *ngIf="loading">Adding...</span>
      </button>
    </form>
  </div>
</div>
