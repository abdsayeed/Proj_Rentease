<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <h1>Create Account</h1>
      <p>Join Rentease today</p>
    </div>

    <div *ngIf="success" class="success-message">
      <h3>✓ Registration Successful!</h3>
      <p>Redirecting to login...</p>
    </div>

    <form *ngIf="!success" (ngSubmit)="onSubmit()" class="register-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          [(ngModel)]="email" 
          name="email"
          placeholder="Enter your email"
          class="form-input"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            id="password" 
            [(ngModel)]="password" 
            name="password"
            placeholder="Create a password"
            class="form-input"
            required
          />
          <button 
            type="button" 
            class="toggle-password" 
            (click)="togglePassword()"
          >
            {{showPassword ? '👁️' : '👁️‍🗨️'}}
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input 
          [type]="showPassword ? 'text' : 'password'" 
          id="confirmPassword" 
          [(ngModel)]="confirmPassword" 
          name="confirmPassword"
          placeholder="Confirm your password"
          class="form-input"
          required
        />
      </div>

      <div class="form-group">
        <label for="role">I want to...</label>
        <select 
          id="role" 
          [(ngModel)]="role" 
          name="role"
          class="form-input"
        >
          <option value="user">Find a property (User)</option>
          <option value="agent">List properties (Agent)</option>
        </select>
      </div>

      <div *ngIf="error" class="error-message">
        {{error}}
      </div>

      <button 
        type="submit" 
        class="submit-btn" 
        [disabled]="loading"
      >
        <span *ngIf="!loading">Create Account</span>
        <span *ngIf="loading" class="loading-spinner">Creating account...</span>
      </button>
    </form>

    <div class="register-footer">
      <p>Already have an account? 
        <a (click)="goToLogin()" class="link">Sign In</a>
      </p>
      <p>
        <a (click)="goToHome()" class="link">← Back to Home</a>
      </p>
    </div>
  </div>
</div>
