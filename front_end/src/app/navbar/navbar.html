<nav class="navbar">
  <div class="nav-container">
    <a routerLink="/properties" class="logo">
      <span class="logo-icon">🏠</span>
      <span class="logo-text">Rentease</span>
    </a>
    
    <button class="menu-toggle" (click)="toggleMenu()">
      <span *ngIf="!menuOpen">☰</span>
      <span *ngIf="menuOpen">✖</span>
    </button>
    
    <ul class="nav-menu" [class.active]="menuOpen">
      <li><a routerLink="/properties" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Properties</a></li>
      
      <!-- Not Logged In -->
      <li *ngIf="!isLoggedIn">
        <a routerLink="/login" routerLinkActive="active">Login</a>
      </li>
      <li *ngIf="!isLoggedIn">
        <a routerLink="/register" routerLinkActive="active">Register</a>
      </li>
      
      <!-- Logged In - All Users -->
      <li *ngIf="isLoggedIn">
        <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      </li>
      <li *ngIf="isLoggedIn">
        <a routerLink="/favorites" routerLinkActive="active">Favorites</a>
      </li>
      
      <!-- Agent & Admin Only -->
      <li *ngIf="isAgent">
        <a routerLink="/add-property" routerLinkActive="active">Add Property</a>
      </li>
      
      <!-- Admin Only -->
      <li *ngIf="isAdmin">
        <a routerLink="/admin" routerLinkActive="active">Admin Panel</a>
      </li>
      
      <!-- User Info -->
      <li *ngIf="isLoggedIn && currentUser" class="user-info">
        <span class="role-badge">{{currentUser.role | titlecase}}</span>
      </li>
      
      <!-- Logout -->
      <li *ngIf="isLoggedIn">
        <button class="logout-btn" (click)="logout()">Logout</button>
      </li>
    </ul>
  </div>
</nav>
